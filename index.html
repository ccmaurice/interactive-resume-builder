<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Resume Builder</title>
  <!-- Google Fonts for premium typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=9">
</head>
<body class="dark-theme">
  
  <!-- App Shell Container -->
  <div class="app-container">
    
    <!-- Top Action Bar -->
    <header class="app-header no-print">
      <div class="header-logo">
        <div class="logo-icon">R</div>
        <h1>Resume<span>Crafter</span></h1>
      </div>
      
      <div class="header-controls">
        <div class="control-group">
          <label for="template-select">Style Template:</label>
          <select id="template-select" class="styled-select">
            <option value="modern-tech" selected>Modern Tech (Sidebar)</option>
            <option value="minimalist">Sleek Minimalist</option>
            <option value="executive">Elegant Executive</option>
          </select>
        </div>
        
        <div class="control-group">
          <label for="page-limit-select">Page Fit:</label>
          <select id="page-limit-select" class="styled-select">
            <option value="fit-1">1 Page (Compact)</option>
            <option value="fit-2" selected>2 Pages (Balanced)</option>
            <option value="fit-3">3 Pages (Expanded)</option>
          </select>
        </div>

        <div class="action-buttons">
          <button id="theme-toggle-btn" class="btn btn-secondary" title="Toggle App Dark/Light Theme">
            <span class="icon">🌓</span> Theme
          </button>
          <button id="import-btn" class="btn btn-secondary" title="Import Resume JSON">
            <span class="icon">📥</span> Import
          </button>
          <button id="export-btn" class="btn btn-secondary" title="Export Resume JSON">
            <span class="icon">📤</span> Export
          </button>
          <button id="reset-btn" class="btn btn-danger" title="Reset to Sample Resume">
            <span class="icon">🔄</span> Reset Demo
          </button>
          <button id="print-btn" class="btn btn-primary" title="Print or Save to PDF">
            <span class="icon">🖨️</span> Save PDF / Print
          </button>
        </div>
      </div>
    </header>

    <!-- Main Workspace -->
    <main class="workspace">
      
      <!-- Left: Editor Panel -->
      <section class="editor-panel no-print">
        <div class="panel-header" style="display: flex; justify-content: space-between; align-items: center; gap: 12px;">
          <div>
            <h2>Resume Editor</h2>
            <span class="subtitle">Customize your details below</span>
          </div>
          <div id="height-warning-badge" class="height-badge" style="font-size: 11px; padding: 5px 10px; border-radius: 20px; font-weight: 700; color: #fff; background-color: var(--accent); white-space: nowrap; transition: all 0.3s;">
            Checking height...
          </div>
        </div>

        <div class="editor-sections">
          
          <!-- Personal Info -->
          <div class="accordion-item active">
            <div class="accordion-header">
              <span class="icon">👤</span>
              <h3>Personal Information</h3>
            </div>
            <div class="accordion-content">
              <div class="form-grid">
                <div class="form-group col-12">
                  <label for="input-name">Full Name</label>
                  <input type="text" id="input-name" placeholder="John Doe">
                </div>
                <div class="form-group col-6">
                  <label for="input-title">Professional Title</label>
                  <input type="text" id="input-title" placeholder="Full Stack Developer">
                </div>
                <div class="form-group col-6">
                  <label for="input-email">Email Address</label>
                  <input type="email" id="input-email" placeholder="example@email.com">
                </div>
                <div class="form-group col-6">
                  <label for="input-phone">Phone Number</label>
                  <input type="text" id="input-phone" placeholder="+234 ...">
                </div>
                <div class="form-group col-6">
                  <label for="input-location">Location</label>
                  <input type="text" id="input-location" placeholder="City, Country">
                </div>
              </div>
            </div>
          </div>

          <!-- Summary -->
          <div class="accordion-item">
            <div class="accordion-header">
              <span class="icon">📝</span>
              <h3>Executive Summary</h3>
            </div>
            <div class="accordion-content">
              <div class="form-group">
                <label for="input-summary">Summary Text</label>
                <textarea id="input-summary" rows="5" placeholder="Brief summary of your professional background and goals..."></textarea>
              </div>
            </div>
          </div>

          <!-- Technical Competencies -->
          <div class="accordion-item">
            <div class="accordion-header">
              <span class="icon">⚙️</span>
              <h3>Technical Competencies</h3>
            </div>
            <div class="accordion-content">
              <div class="form-grid">
                <div class="form-group col-12">
                  <label for="input-comp-languages">Languages (e.g. PHP, Python)</label>
                  <input type="text" id="input-comp-languages" placeholder="PHP (Expert), JavaScript (Expert)">
                </div>
                <div class="form-group col-12">
                  <label for="input-comp-frameworks">Frameworks & Libraries</label>
                  <input type="text" id="input-comp-frameworks" placeholder="Next.js, React, Tailwind CSS">
                </div>
                <div class="form-group col-12">
                  <label for="input-comp-backend">Backend & Ops</label>
                  <input type="text" id="input-comp-backend" placeholder="PostgreSQL, MySQL, Supabase, Vercel">
                </div>
                <div class="form-group col-12">
                  <label for="input-comp-systems">Systems & Hardware</label>
                  <input type="text" id="input-comp-systems" placeholder="Computer OS, Hardware Networking">
                </div>
                <div class="form-group col-12">
                  <label for="input-comp-soft">Soft Skills</label>
                  <input type="text" id="input-comp-soft" placeholder="Team Management, Emotional Intelligence">
                </div>
              </div>
            </div>
          </div>

          <!-- Professional Experience -->
          <div class="accordion-item">
            <div class="accordion-header">
              <span class="icon">💼</span>
              <h3>Work Experience</h3>
            </div>
            <div class="accordion-content">
              <div id="experience-list" class="dynamic-list">
                <!-- Dynamic items added via JS -->
              </div>
              <button id="add-experience-btn" class="btn btn-secondary btn-sm">+ Add Experience</button>
            </div>
          </div>

          <!-- Key Projects -->
          <div class="accordion-item">
            <div class="accordion-header">
              <span class="icon">🚀</span>
              <h3>Key Projects</h3>
            </div>
            <div class="accordion-content">
              <div id="projects-list" class="dynamic-list">
                <!-- Dynamic items added via JS -->
              </div>
              <button id="add-project-btn" class="btn btn-secondary btn-sm">+ Add Project</button>
            </div>
          </div>

          <!-- Education -->
          <div class="accordion-item">
            <div class="accordion-header">
              <span class="icon">🎓</span>
              <h3>Education</h3>
            </div>
            <div class="accordion-content">
              <div id="education-list" class="dynamic-list">
                <!-- Dynamic items added via JS -->
              </div>
              <button id="add-education-btn" class="btn btn-secondary btn-sm">+ Add Education</button>
            </div>
          </div>

          <!-- Certifications -->
          <div class="accordion-item">
            <div class="accordion-header">
              <span class="icon">🏅</span>
              <h3>Certifications & Credentials</h3>
            </div>
            <div class="accordion-content">
              <div id="certifications-list" class="dynamic-list">
                <!-- Dynamic items added via JS -->
              </div>
              <button id="add-certification-btn" class="btn btn-secondary btn-sm">+ Add Certification</button>
            </div>
          </div>

          <!-- Hobbies -->
          <div class="accordion-item">
            <div class="accordion-header">
              <span class="icon">🎨</span>
              <h3>Hobbies & Extra Curricula</h3>
            </div>
            <div class="accordion-content">
              <div class="form-group">
                <label for="input-hobbies">Hobbies (comma separated)</label>
                <input type="text" id="input-hobbies" placeholder="Chess, Scrabble, Football, Swimming">
              </div>
            </div>
          </div>

        </div>
      </section>

      <!-- Right: Preview Panel -->
      <section class="preview-panel">
        <div class="preview-container" id="preview-container">
          
          <!-- Resume Sheet (A4 Proportion) -->
          <div class="resume-sheet modern-tech" id="resume-sheet">
            <!-- Rendered by app.js -->
          </div>

        </div>
      </section>

    </main>
  </div>

  <!-- File input hidden for JSON import -->
  <input type="file" id="import-file-input" style="display: none;" accept=".json">

  <script src="app.js?v=9"></script>
</body>
</html>
